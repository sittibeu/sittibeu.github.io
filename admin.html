<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>บิ่วบิ๋ว — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&family=Kanit:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --card: #161616;
      --accent: #f5c518;
      --accent2: #ff6b35;
      --text: #e0e0e0;
      --muted: #555;
      --border: #2a2a2a;
      --paid: #22c55e;
      --unpaid: #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
    }

    /* ===== LOGIN ===== */
    .login-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .login-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 32px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .login-box h2 {
      font-family: 'Kanit', sans-serif;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .login-box p {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .login-box input {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Sarabun', sans-serif;
      font-size: 15px;
      padding: 12px 14px;
      outline: none;
      margin-bottom: 14px;
      text-align: center;
      letter-spacing: 4px;
    }

    .login-box input:focus {
      border-color: var(--accent);
    }

    .login-btn {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 10px;
      font-family: 'Kanit', sans-serif;
      font-size: 16px;
      font-weight: 700;
      padding: 13px;
      cursor: pointer;
    }

    .login-err {
      color: var(--unpaid);
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }

    /* ===== DASHBOARD ===== */
    .dashboard { display: none; }

    .topbar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar-title {
      font-family: 'Kanit', sans-serif;
      font-size: 18px;
      font-weight: 700;
    }

    .topbar-title span { color: var(--accent); }

    .logout-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 6px 14px;
      font-family: 'Sarabun', sans-serif;
      font-size: 13px;
      cursor: pointer;
    }

    .logout-btn:hover { border-color: var(--unpaid); color: var(--unpaid); }

    /* ===== STATS ===== */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 20px 20px 0;
      max-width: 900px;
      margin: 0 auto;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 16px;
      text-align: center;
    }

    .stat-num {
      font-family: 'Kanit', sans-serif;
      font-size: 32px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
    }

    .stat-card.paid .stat-num   { color: var(--paid); }
    .stat-card.unpaid .stat-num { color: var(--unpaid); }
    .stat-card.total .stat-num  { color: var(--accent); }

    /* ===== CONTROLS ===== */
    .controls {
      max-width: 900px;
      margin: 16px auto 0;
      padding: 0 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .controls input {
      flex: 1;
      min-width: 180px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Sarabun', sans-serif;
      font-size: 14px;
      padding: 9px 14px;
      outline: none;
    }

    .controls input:focus { border-color: var(--accent); }

    .filter-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 8px 14px;
      font-family: 'Sarabun', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn.active { border-color: var(--accent); color: var(--accent); }

    .add-btn {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-family: 'Kanit', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    /* ===== TABLE ===== */
    .table-wrap {
      max-width: 900px;
      margin: 14px auto 40px;
      padding: 0 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    thead tr {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    thead th {
      padding: 12px 14px;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-align: left;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }

    tbody td {
      padding: 12px 14px;
      font-size: 14px;
      vertical-align: middle;
    }

    .num-badge {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px 8px;
      font-family: 'Kanit', sans-serif;
      font-size: 13px;
      color: var(--accent);
    }

    .status-btn {
      border: none;
      border-radius: 8px;
      padding: 5px 14px;
      font-family: 'Kanit', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s;
    }

    .status-btn:active { transform: scale(0.95); }
    .status-btn.paid   { background: rgba(34,197,94,0.15); color: var(--paid); }
    .status-btn.unpaid { background: rgba(239,68,68,0.15);  color: var(--unpaid); }

    .del-btn {
      background: none;
      border: none;
      color: #333;
      cursor: pointer;
      font-size: 16px;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 0.15s;
    }

    .del-btn:hover { color: var(--unpaid); }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
      font-size: 14px;
    }

    /* ===== MODAL ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 24px;
      width: 100%;
      max-width: 400px;
    }

    .modal h3 {
      font-family: 'Kanit', sans-serif;
      font-size: 18px;
      margin-bottom: 20px;
    }

    .modal .field { margin-bottom: 14px; }

    .modal label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 5px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .modal input {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 9px;
      color: var(--text);
      font-family: 'Sarabun', sans-serif;
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
    }

    .modal input:focus { border-color: var(--accent); }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .modal-cancel {
      flex: 1;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 10px;
      padding: 12px;
      font-family: 'Sarabun', sans-serif;
      font-size: 14px;
      cursor: pointer;
    }

    .modal-save {
      flex: 2;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-family: 'Kanit', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    /* mobile */
    @media (max-width: 500px) {
      .stats { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .stat-num { font-size: 24px; }
      thead th:nth-child(3),
      tbody td:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-wrap" id="loginWrap">
    <div class="login-box">
      <h2>🔐 Admin Panel</h2>
      <p>บิ่วบิ๋ว Print — ระบบติดตามการชำระเงิน</p>
      <input type="password" id="passInput" placeholder="รหัสผ่าน" onkeydown="if(event.key==='Enter')doLogin()" />
      <button class="login-btn" onclick="doLogin()">เข้าสู่ระบบ</button>
      <div class="login-err" id="loginErr">รหัสผ่านไม่ถูกต้อง</div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">

    <div class="topbar">
      <div class="topbar-title">บิ่วบิ๋ว <span>Admin</span></div>
      <button class="logout-btn" onclick="doLogout()">ออกจากระบบ</button>
    </div>

    <!-- STATS -->
    <div class="stats">
      <div class="stat-card total">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-label">ออเดอร์ทั้งหมด</div>
      </div>
      <div class="stat-card paid">
        <div class="stat-num" id="statPaid">0</div>
        <div class="stat-label">จ่ายแล้ว ✅</div>
      </div>
      <div class="stat-card unpaid">
        <div class="stat-num" id="statUnpaid">0</div>
        <div class="stat-label">ยังไม่จ่าย ❌</div>
      </div>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
      <input type="text" id="searchInput" placeholder="🔍 ค้นหาชื่อ / เลขที่..." oninput="renderTable()" />
      <button class="filter-btn active" id="filterAll"    onclick="setFilter('all')">ทั้งหมด</button>
      <button class="filter-btn"        id="filterUnpaid" onclick="setFilter('unpaid')">ยังไม่จ่าย</button>
      <button class="filter-btn"        id="filterPaid"   onclick="setFilter('paid')">จ่ายแล้ว</button>
      <button class="add-btn" onclick="openModal()">+ เพิ่มออเดอร์</button>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>เลขที่</th>
            <th>ชื่อ-นามสกุล</th>
            <th>เรื่อง</th>
            <th>สถานะ</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

  </div>

  <!-- MODAL เพิ่มออเดอร์ -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3>➕ เพิ่มออเดอร์ใหม่</h3>
      <div class="field">
        <label>เลขที่</label>
        <input type="text" id="mNum" placeholder="001" maxlength="3" />
      </div>
      <div class="field">
        <label>ชื่อ-นามสกุล</label>
        <input type="text" id="mName" placeholder="เช่น ขันตี อุตสาหะ" />
      </div>
      <div class="field">
        <label>รายงานเรื่อง</label>
        <input type="text" id="mTopic" placeholder="เช่น ระเบียบส่วนตัวไม่เรียบร้อย" />
      </div>
      <div class="modal-actions">
        <button class="modal-cancel" onclick="closeModal()">ยกเลิก</button>
        <button class="modal-save" onclick="saveOrder()">บันทึก</button>
      </div>
    </div>
  </div>

  <script>
    // ===== CONFIG =====
    const PASSWORD = '4321';   // ← เปลี่ยนรหัสผ่านได้ตรงนี้

    // ===== STATE =====
    let orders = JSON.parse(localStorage.getItem('bw_orders') || '[]');
    let filter = 'all';

    // ===== SAVE =====
    function save() {
      localStorage.setItem('bw_orders', JSON.stringify(orders));
    }

    // ===== LOGIN =====
    function doLogin() {
      const val = document.getElementById('passInput').value;
      if (val === PASSWORD) {
        document.getElementById('loginWrap').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        renderTable();
      } else {
        document.getElementById('loginErr').style.display = 'block';
      }
    }

    function doLogout() {
      document.getElementById('loginWrap').style.display = 'flex';
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('passInput').value = '';
    }

    // ===== FILTER =====
    function setFilter(f) {
      filter = f;
      ['filterAll','filterUnpaid','filterPaid'].forEach(id => {
        document.getElementById(id).classList.remove('active');
      });
      document.getElementById(
        f === 'all' ? 'filterAll' : f === 'unpaid' ? 'filterUnpaid' : 'filterPaid'
      ).classList.add('active');
      renderTable();
    }

    // ===== RENDER =====
    function renderTable() {
      const q = document.getElementById('searchInput').value.toLowerCase();

      let filtered = orders.filter(o => {
        const matchSearch = o.name.toLowerCase().includes(q) || o.num.includes(q);
        const matchFilter = filter === 'all' ||
          (filter === 'paid'   && o.paid) ||
          (filter === 'unpaid' && !o.paid);
        return matchSearch && matchFilter;
      });

      // เรียงตามเลขที่ — เลขเดียวกันอยู่ติดกัน, ถ้ามีค้างหลายรายการให้ขึ้นก่อน
      filtered.sort((a, b) => {
        const numA = parseInt(a.num) || 0;
        const numB = parseInt(b.num) || 0;
        if (numA !== numB) return numA - numB;
        // เลขเดียวกัน: ที่ยังไม่จ่ายขึ้นก่อน
        return (a.paid ? 1 : 0) - (b.paid ? 1 : 0);
      });

      // นับจำนวนค้างของแต่ละเลขที่
      const unpaidCount = {};
      orders.forEach(o => {
        if (!o.paid) unpaidCount[o.num] = (unpaidCount[o.num] || 0) + 1;
      });

      // Stats
      document.getElementById('statTotal').textContent  = orders.length;
      document.getElementById('statPaid').textContent   = orders.filter(o => o.paid).length;
      document.getElementById('statUnpaid').textContent = orders.filter(o => !o.paid).length;

      const tbody = document.getElementById('tableBody');

      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state">ไม่มีข้อมูล</div></td></tr>`;
        return;
      }

      tbody.innerHTML = filtered.map(o => {
        const cnt = unpaidCount[o.num] || 0;
        const badge = (!o.paid && cnt > 1)
          ? `<span style="margin-left:6px;background:var(--unpaid);color:#fff;border-radius:999px;font-size:10px;padding:1px 7px;font-family:'Kanit',sans-serif;">${cnt} ค้าง</span>`
          : '';
        return `
        <tr style="${!o.paid && cnt > 1 ? 'background:rgba(239,68,68,0.04);' : ''}">
          <td><span class="num-badge">${o.num}</span>${badge}</td>
          <td>${o.name}</td>
          <td style="font-size:13px; color:var(--muted);">${o.topic || '-'}</td>
          <td>
            <button class="status-btn ${o.paid ? 'paid' : 'unpaid'}"
              onclick="togglePaid('${o.id}')">
              ${o.paid ? '✅ จ่ายแล้ว' : '❌ ยังไม่จ่าย'}
            </button>
          </td>
          <td>
            <button class="del-btn" onclick="deleteOrder('${o.id}')">🗑</button>
          </td>
        </tr>
      `; }).join('');
    }

    // ===== TOGGLE PAID =====
    function togglePaid(id) {
      const o = orders.find(x => x.id === id);
      if (o) { o.paid = !o.paid; save(); renderTable(); }
    }

    // ===== DELETE =====
    function deleteOrder(id) {
      if (!confirm('ลบออเดอร์นี้?')) return;
      orders = orders.filter(x => x.id !== id);
      save(); renderTable();
    }

    // ===== MODAL =====
    function openModal() {
      document.getElementById('modalOverlay').classList.add('open');
      document.getElementById('mNum').focus();
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
      ['mNum','mName','mUnit','mTopic'].forEach(id => {
        document.getElementById(id).value = '';
      });
    }

    function saveOrder() {
      const num   = document.getElementById('mNum').value.trim();
      const name  = document.getElementById('mName').value.trim();
      const topic = document.getElementById('mTopic').value.trim();

      if (!num || !name) {
        alert('กรุณากรอกเลขที่และชื่อ');
        return;
      }

      orders.push({
        id:    Date.now().toString(),
        num, name, topic,
        paid:  false
      });

      save(); closeModal(); renderTable();
    }

    // กด ESC ปิด modal
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });
  </script>
</body>
</html>
